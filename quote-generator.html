<!DOCTYPE html>
<html>

<head>
<title>Ultimate Quote Generator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

:root{
--bg:#111827;
--card:#1f2937;
--text:white;
}

.light{
--bg:#f5f5f5;
--card:white;
--text:#111;
}

body{

background:
linear-gradient(
135deg,
#4f46e5,
#9333ea
);

height:100vh;

display:flex;

justify-content:center;

align-items:center;

transition:.4s;
}

.card{

width:430px;

padding:35px;

background:var(--card);

border-radius:24px;

color:var(--text);

box-shadow:
0 20px 50px rgba(0,0,0,.3);

}

.title{

display:flex;

justify-content:space-between;

margin-bottom:25px;

}

.quote{

font-size:24px;

min-height:140px;

line-height:1.5;

}

.author{

margin-top:20px;

opacity:.7;

}

.buttons{

display:grid;

grid-template-columns:
1fr 1fr;

gap:10px;

margin-top:30px;

}

button{

padding:14px;

border:none;

border-radius:10px;

cursor:pointer;

}

.primary{

background:#6366f1;

color:white;

}

.secondary{

background:#374151;

color:white;

}

.favorite{

margin-top:20px;

max-height:150px;

overflow:auto;

}

.favorite div{

padding:10px;

margin:8px 0;

background:rgba(255,255,255,.08);

border-radius:8px;

}

</style>

</head>

<body>

<div class="card">

<div class="title">

<h2>✨ Quote App</h2>

<button onclick="toggleTheme()">
🌙
</button>

</div>

<div
class="quote"
id="quote">
Loading...
</div>

<div
class="author"
id="author">
</div>

<div class="buttons">

<button
class="primary"
onclick="getQuote()">
New Quote
</button>

<button
class="secondary"
onclick="copyQuote()">
Copy
</button>

<button
class="primary"
onclick="tweetQuote()">
Tweet
</button>

<button
class="secondary"
onclick="saveFav()">
❤️ Save
</button>

</div>

<div class="favorite">

<h3>Favorites</h3>

<div id="favList"></div>

</div>

</div>

<script>

let current="";

async function getQuote(){

try{

let res=await fetch(
"https://api.quotable.io/random"
);

let data=await res.json();

current=
`"${data.content}" — ${data.author}`;

quote.innerText=
`"${data.content}"`;

author.innerText=
`— ${data.author}`;

}catch{

quote.innerText=
"Failed loading";

}

}

function copyQuote(){

navigator.clipboard.writeText(
current
);

alert("Copied");

}

function tweetQuote(){

window.open(

`https://twitter.com/intent/tweet?text=${encodeURIComponent(current)}`

);

}

function saveFav(){

let fav=JSON.parse(

localStorage.getItem(
"quotes"
)||"[]"

);

fav.push(current);

localStorage.setItem(

"quotes",
JSON.stringify(fav)

);

loadFav();

}

function loadFav(){

let fav=JSON.parse(

localStorage.getItem(
"quotes"
)||"[]"

);

favList.innerHTML="";

fav.forEach(q=>{

favList.innerHTML+=
`<div>${q}</div>`;

});

}

function toggleTheme(){

document.body.classList.toggle(
"light"
);

}

getQuote();

loadFav();

</script>

</body>

</html>
