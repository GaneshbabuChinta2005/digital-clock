<!DOCTYPE html>
<html>
<head>
<title>Modern Digital Clock</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        -45deg,
        #0f172a,
        #1e3a8a,
        #7c3aed,
        #0ea5e9
    );

    background-size:400% 400%;
    animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:360px;

    padding:35px;

    border-radius:24px;

    background:rgba(255,255,255,0.12);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.2);

    text-align:center;

    color:white;

    box-shadow:
    0 10px 40px rgba(0,0,0,.3);

    transition:.4s;
}

.card:hover{
    transform:translateY(-8px);
}

.title{
    font-size:18px;
    opacity:.8;
    margin-bottom:15px;
}

.clock{
    font-size:64px;
    font-weight:bold;
    letter-spacing:3px;
}

.date{
    margin-top:16px;
    font-size:18px;
    opacity:.85;
}

.line{
    width:90px;
    height:4px;

    background:white;

    margin:20px auto;

    border-radius:10px;
}

@media(max-width:450px){

.clock{
    font-size:44px;
}

.card{
    width:90%;
}
}
</style>

</head>

<body>

<div class="card">

<div class="title">
DIGITAL CLOCK
</div>

<div class="clock" id="clock">
00:00:00
</div>

<div class="line"></div>

<div class="date" id="date">
Loading...
</div>

</div>

<script>

function updateClock(){

let now=new Date();

let h=String(now.getHours()).padStart(2,'0');
let m=String(now.getMinutes()).padStart(2,'0');
let s=String(now.getSeconds()).padStart(2,'0');

document.getElementById(
"clock"
).innerText=
`${h}:${m}:${s}`;

document.getElementById(
"date"
).innerText=
now.toDateString();

}

updateClock();

setInterval(
updateClock,
1000
);

</script>

</body>
</html>
